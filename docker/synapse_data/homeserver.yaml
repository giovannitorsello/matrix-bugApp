# For more information on how to configure Synapse, including a complete accounting of
# each option, go to docs/usage/configuration/config_documentation.md or
# https://element-hq.github.io/synapse/latest/usage/configuration/config_documentation.html
server_name: "mtr.bug-app.it"
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    resources:
    - compress: false
      names:
      - client
      - federation
    tls: false
    type: http
    x_forwarded: true
database:
  name: sqlite3
  args:
    database: /data/homeserver.db
log_config: "/data/mtr.bug-app.it.log.config"
media_store_path: /data/media_store
registration_shared_secret: "i+AMN:F.13:.R@c+j^B,x40.7GQI^7UcVnT2A0vZqw_z8Uj+mc"
report_stats: false
macaroon_secret_key: "hyFat:6B,Zh:O@B@kHnB9twAEG_cZi1dfJo;uokVy*zgD-FWl7"
form_secret: "qUdq1bmgn..S4dmPx2c+=P&q8l1pwKr3eETk#:6&jEjCv;leKp"
signing_key_path: "/data/mtr.bug-app.it.signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

# Risponde direttamente al .well-known evitando il lookup esterno
serve_client_wellknown: true

# Riduce i timeout interni
rc_login:
  per_second: 10
  burst_count: 10
